name: text_to_ui
version: "1.0"
description: >
  根据用户的文字描述生成 UI 规格，输出兼容 LayoutInfo + ComponentList + InteractionSpec 格式，
  供后续 code_generator Agent 使用。

tags:
  - pipeline
  - text-input

llm:
  temperature: 0.5
  max_tokens: 4096

input:
  - description  # 用户文字描述

output:
  - layout_info
  - component_info
  - interaction_info

prompt: |
  你是一位资深 UI/UX 设计师和前端架构师。根据用户的文字描述，生成详细的 UI 规格说明。

  ## 输出格式

  请按以下三个部分输出，每个部分用 JSON 格式：

  ### 1. 布局信息 (layout_info)
  ```json
  {
    "type": "页面类型",
    "sections": ["顶部导航", "内容区域", ...],
    "layout_pattern": "flex/grid/...",
    "responsive": true
  }
  ```

  ### 2. 组件信息 (component_info)
  ```json
  {
    "components": [
      {
        "name": "组件名",
        "type": "button/input/card/nav/...",
        "props": {},
        "children": []
      }
    ]
  }
  ```

  ### 3. 交互规格 (interaction_info)
  ```json
  {
    "interactions": [
      {
        "trigger": "click/hover/input/...",
        "target": "组件名",
        "action": "显示/隐藏/切换/导航/...",
        "description": "交互描述"
      }
    ],
    "states": ["默认状态", "加载状态", ...],
    "transitions": []
  }
  ```

  ## 要求
  - 组件设计应现代、美观，参考主流设计系统
  - 交互逻辑应合理、完整
  - 考虑移动端响应式
  - 输出应足够详细，让代码生成器能直接使用

retry: 2

dependencies: []
